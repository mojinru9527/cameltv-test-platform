name: develop 导入冒烟门禁

# 背景：既有 pr-check.yml 仅 `on: pull_request: branches: [main, master]`，
# 而团队日常主分支是 develop —— 导致所有 develop PR 绕过代码门禁，
# 曾使「已提交代码引用未提交模块、全新检出即无法导入」的问题长期潜伏。
# 本工作流补齐 develop 的最小「全新检出可导入」冒烟，杜绝该类问题复发。
#
# 范围有意最小且必然为绿：仅验证后端 tracked 代码在干净检出下可导入 +
# alembic 版本链单头。前端 tsc / 完整 pytest / alembic upgrade 的门禁留作
# 后续（依赖先修复共享测试夹具漂移与 alembic 从零升级漂移，详见
# work-logs/reviews/BATCH-B-repo-hygiene-findings.md）。

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  backend-import-smoke:
    name: 后端全新检出导入冒烟
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        working-directory: test-platform-v2/backend
        run: pip install -r requirements.txt

      - name: 导入冒烟（app.main 必须可导入）
        working-directory: test-platform-v2/backend
        run: python -c "import app.main; print('import OK: routers/models resolve on clean checkout')"

      - name: Alembic 版本链单头校验（链必须连续、无断裂/多头）
        working-directory: test-platform-v2/backend
        run: |
          heads="$(python -m alembic heads 2>/dev/null | grep -c '(head)')"
          echo "alembic heads = $heads"
          test "$heads" -eq 1
