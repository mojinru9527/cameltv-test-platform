name: 文档保鲜检查

on:
  schedule:
    - cron: '7 1 1 * *'   # 每月 1 日 01:07 UTC
  workflow_dispatch:
    inputs:
      strict:
        description: '严格模式（有过期即失败）'
        required: false
        type: boolean
        default: true

jobs:
  doc-freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install pyyaml

      - name: Check Document Freshness
        id: freshness
        run: python scripts/check_doc_freshness.py --ci
        continue-on-error: true

      - name: Generate JSON Report
        if: always()
        run: python scripts/check_doc_freshness.py --json > doc-freshness-report.json

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doc-freshness-report
          path: doc-freshness-report.json
          retention-days: 90

      - name: Notify Expired Documents
        if: steps.freshness.outcome == 'failure'
        run: |
          echo "::warning:: 文档保鲜检查失败 — 存在过期或即将过期的文档。"
          echo "请更新对应文档的 last_reviewed 和 expires 字段。"
          echo "本地运行: python scripts/check_doc_freshness.py --fix"
