name: PR 代码门禁

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  backend-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        working-directory: test-platform-v2/backend
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Lint (ruff)
        working-directory: test-platform-v2/backend
        continue-on-error: true
        run: |
          pip install ruff
          ruff check app/ --output-format=github || echo "::warning::ruff 检查发现问题"

      - name: Type Check (mypy)
        working-directory: test-platform-v2/backend
        continue-on-error: true
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports --no-error-summary || echo "::warning::mypy 类型检查发现问题"

      # D4: pytest with coverage.  --cov-fail-under=70 is a soft gate initially
      # (continue-on-error); will become a hard gate after 2-week observation.
      - name: Unit Tests + Coverage (pytest)
        working-directory: test-platform-v2/backend
        continue-on-error: true
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=app --cov-report=term --cov-report=json \
            --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: test-platform-v2/backend/coverage.json
          retention-days: 7

  # PostgreSQL 兼容性验证 — 校验 Alembic 迁移 + 模型导入在 PG 上通过。
  # 与 backend-check (SQLite) 并行运行，确保 PG 升级路径不被破坏。
  backend-check-pg:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cameltv
          POSTGRES_PASSWORD: cameltv_test
          POSTGRES_DB: cameltv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        working-directory: test-platform-v2/backend
        run: |
          pip install -r requirements.txt
          pip install psycopg2-binary

      - name: Verify Alembic migrations on PostgreSQL
        working-directory: test-platform-v2/backend
        env:
          DATABASE_URL: postgresql://cameltv:cameltv_test@localhost:5432/cameltv_test
        run: |
          alembic upgrade head
          echo "✅ Alembic migrations applied successfully on PostgreSQL"

      - name: Verify model import on PostgreSQL
        working-directory: test-platform-v2/backend
        env:
          DATABASE_URL: postgresql://cameltv:cameltv_test@localhost:5432/cameltv_test
          AUTO_CREATE_TABLES: 'false'
        run: |
          python -c "
          from app.main import app
          from app.core.db import engine, Base
          # Verify all models are importable and tables exist
          tables = Base.metadata.tables.keys()
          print(f'✅ {len(tables)} tables registered: {\", \".join(sorted(tables))}')
          assert len(tables) >= 30, f'Expected >=30 tables, got {len(tables)}'
          "

      # D5: Detect schema drift between ORM models and Alembic migrations.
      # Runs on the same PG service — drops tables between steps so they don't
      # interfere.  Non-blocking initially (continue-on-error); will become a
      # hard gate once the team confirms zero false positives over 2 weeks.
      - name: Check Model-Migration Drift (D5)
        working-directory: test-platform-v2/backend
        env:
          DATABASE_URL: postgresql://cameltv:cameltv_test@localhost:5432/cameltv_test
        continue-on-error: true
        run: |
          python scripts/check_migration_drift.py

  # D2: CI accessibility gate — scans built SPA for WCAG violations using
  # axe-core.  Scans the login page (no auth needed) which exercises the
  # full component tree (buttons, inputs, headings, landmarks, contrast).
  # Non-blocking initially; threshold tightens after 1-week observation.
  frontend-a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: test-platform-v2/frontend
        run: npm ci

      - name: Build
        working-directory: test-platform-v2/frontend
        run: npm run build

      - name: A11y Scan (axe-core)
        working-directory: test-platform-v2/frontend
        continue-on-error: true
        run: |
          npx serve dist -p 4173 &
          SERVE_PID=$!
          sleep 3
          npx @axe-core/cli --stdout http://localhost:4173/login > a11y-results.json 2>&1 || true
          cat a11y-results.json
          kill $SERVE_PID 2>/dev/null || true

      - name: Upload A11y Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-results
          path: test-platform-v2/frontend/a11y-results.json
          retention-days: 7

  frontend-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: test-platform-v2/frontend
        run: npm ci

      - name: Type Check (tsc)
        working-directory: test-platform-v2/frontend
        run: npx tsc -b --noEmit

      - name: Lint (ESLint)
        working-directory: test-platform-v2/frontend
        continue-on-error: true
        run: npx eslint src/ --ext .ts,.tsx || echo "::warning::ESLint 检查发现问题（可能未配置）"

      # D4: vitest with coverage.  Thresholds in vitest.config.ts are a soft gate
      # initially (continue-on-error); will become a hard gate after observation.
      - name: Unit Tests + Coverage (vitest)
        working-directory: test-platform-v2/frontend
        continue-on-error: true
        run: npx vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: test-platform-v2/frontend/coverage/
          retention-days: 7
