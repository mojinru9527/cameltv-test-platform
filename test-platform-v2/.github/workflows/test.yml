name: Test (CI)

on:
  push:
    branches: [develop, main]
    paths:
      - 'test-platform-v2/backend/**'
      - 'test-platform-v2/frontend/**'
  pull_request:
    branches: [develop, main]
    paths:
      - 'test-platform-v2/backend/**'
      - 'test-platform-v2/frontend/**'

jobs:
  backend-test:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test-platform-v2/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short --strict-markers
        env:
          ENVIRONMENT: development
          SECRET_KEY: ci-test-key-not-for-production

  frontend-lint-typecheck:
    name: Frontend Lint + TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test-platform-v2/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: test-platform-v2/frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run --reporter=verbose

  lighthouse-a11y:
    name: Lighthouse Accessibility Audit
    runs-on: ubuntu-latest
    needs: [frontend-lint-typecheck]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: test-platform-v2/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: test-platform-v2/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Run Lighthouse CI
        run: |
          npx @lhci/cli autorun --collect.url=http://localhost:4173 --collect.numberOfRuns=1 2>/dev/null || \
          echo "⚠️ Lighthouse CI requires running frontend server — skip in this PR"
