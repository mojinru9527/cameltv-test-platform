[tool.ruff]
# Ruff configuration for CamelTv test-platform-v2 backend
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501"]  # line-too-long — handled by line-length setting

[tool.ruff.lint.per-file-ignores]
# Intentional: lazy imports to break circular dependency chains
"app/api/v1/defect.py" = ["E402"]
"app/api/v1/knowledge.py" = ["E402"]
"app/api/v1/project.py" = ["E402"]
"app/api/v1/test_case.py" = ["E402", "E712"]
"app/api/v1/wiki.py" = ["E402", "E702"]
# SQLAlchemy filter: `column == True` is idiomatic, not a bool comparison bug
"app/api/v1/open_api.py" = ["E712"]
"app/api/v1/requirement.py" = ["E712"]
"app/services/test_case_service.py" = ["E712"]
"app/services/report_service.py" = ["E712"]
# Pre-existing wiki service code — semicolon style inherited from upstream
"app/services/wiki/*" = ["E702"]
# Lazy imports to break circular dependency chains
"app/core/base_service.py" = ["E402"]
"app/services/perf_collector_service.py" = ["E402"]
