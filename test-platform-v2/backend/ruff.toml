# Ruff configuration for CamelTv test platform backend
target-version = "py311"

[lint]
select = [
    "F",   # pyflakes
    "B",   # flake8-bugbear
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
]
# B008: FastAPI default arguments like Query(""), Depends(...) are idiomatic
# B904: raise without from inside except is acceptable in error translation layers
# B007: unused loop control variable — caught by F841
# B905: zip without strict — nice-to-have, not critical
# B017: assert-raises-exception pattern varies by test style
# B011: assert False is intentional in unreachable code paths
extend-ignore = [
    "B008",  # function-call-in-default-argument (FastAPI idiomatic)
    "B007",  # unused-loop-control-variable
    "B904",  # raise-without-from-inside-except (FastAPI error translation)
    "B905",  # zip-without-explicit-strict
    "B017",  # assert-raises-exception
    "B011",  # assert-false
]

[lint.per-file-ignores]
"tests/**" = ["B904", "B017", "B011"]

[format]
# Use Ruff formatter
indent-style = "space"
