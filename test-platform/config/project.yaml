# CamelTv 项目元信息（v2 单项目模型）
name: CamelTv
description: 骆驼体育预测平台
version: "14.0"

# 环境代理策略：test=内网直连，prod=vpn07 tun 代理
proxy_strategy:
  test: direct
  prod: vpn07

# 多语言（P2 占位）
locales:
  - en

# ELK 日志平台（凭据走 .env）
elk:
  url: "${ELASTIC_URL}"
  api_key: "${ELASTIC_API_KEY}"
  kibana_url: "https://elk.elelive.cn/app/kibana"
  index: "camel1-app-*"
  trace_field: "traceId"
  time_field: "@timestamp"

# 接口目录（等同于旧 _base/apis.yaml）
apis:
  ugc_list:
    path: /api/ugc/list
    method: GET
    description: 文章列表（在售+免费，置顶/比赛时间排序）
    query: {categoryId: "A", page: 1, size: 20}
    expect_fields: [data, total]

  ugc_detail:
    path: /api/ugc/detail
    method: GET
    description: 文章详情（含预测项、解锁脱敏）
    query: {articleId: "X"}
    expect_fields: [data]

  ugc_unlock:
    path: /api/ugc/unlock
    method: POST
    description: 单篇付费解锁
    body: {articleId: "X"}
    expect_fields: [success]

  refund_eligibility:
    path: /api/refund/eligibility
    method: GET
    description: 首单不中退币资格查询
    expect_fields: [eligible]

  refund_first_bet:
    path: /api/refund/firstBet
    method: POST
    description: 首单不中退币
    body: {orderId: "O1"}
    expect_fields: [success]

  pay_packages:
    path: /api/pay/packages
    method: GET
    description: 充值套餐列表（含赠送 Bonus）
    query: {payType: "fiat", currency: "USD", payMethodId: "M1"}
    expect_fields: [data]

  pay_order:
    path: /api/pay/order
    method: POST
    description: 创建支付订单
    body: {packageId: "P1", payMethodId: "M1"}
    expect_fields: [orderId]

  author_follow:
    path: /api/author/follow
    method: POST
    description: 关注作者
    body: {authorId: "X"}
    expect_fields: [success]

  author_unfollow:
    path: /api/author/unfollow
    method: POST
    description: 取消关注
    body: {authorId: "X"}
    expect_fields: [success]

  home_recommend:
    path: /api/home/recommend
    method: GET
    description: 首页预测推荐（Yield 前5作者）
    expect_fields: [data]

  wallet_balance:
    path: /api/wallet/balance
    method: GET
    description: 骆驼币余额
    expect_fields: [balance]

  wallet_records:
    path: /api/wallet/records
    method: GET
    description: 骆驼币流水记录
    query: {page: 1, size: 20}
    expect_fields: [data, total]

# Diff 忽略规则 + 容差
ignore_paths:
  - "root['data']['traceId']"
  - "root['traceId']"
  - "root['timestamp']"
  - "root['data']['timestamp']"
  - "root['serverTime']"
  - "root['data']['id']"
  - "root['requestId']"

tolerance:
  float_abs: 0.01
  array_unordered: true
  ignore_type_str_num: true
