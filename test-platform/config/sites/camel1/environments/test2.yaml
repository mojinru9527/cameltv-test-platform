# camel1 · 测试环境 2
name: test2
kind: test
base_url: https://test2.camel1.internal      # 占位，按真实测试域名改
proxy: ""
auth_token: "${CAMEL1_TEST2_AUTH_TOKEN}"
expect_version: ">=1.0.0"

dbs:
  - name: app_db
    type: mysql
    dsn: "mysql+pymysql://test:${CAMEL1_TEST2_DB_PWD}@test2-db.camel1.internal:3306/app"
    check: rw

redis:
  - {name: cache, host: test2-redis.camel1.internal, port: 6379, password: "${CAMEL1_TEST2_REDIS_PWD}", db: 0}

mqs:
  - {name: order_mq, type: rabbitmq, url: "amqp://test2-mq.camel1.internal:5672"}

https:
  - {name: 文章服务, url: "https://test2.camel1.internal/api/ugc/health", expect_version: ">=1.0.0"}

preset_data:
  - {db: app_db, table: t_dict, min_rows: 1}
