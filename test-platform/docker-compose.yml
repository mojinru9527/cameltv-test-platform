version: '3.8'

services:
  # ============================================================
  # API Server — FastAPI 后端，包装 tp CLI 引擎
  # ============================================================
  api-server:
    build:
      context: .
      dockerfile: docker/api-server.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./tests:/app/tests:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================
  # Web UI — React 前端 + nginx
  # ============================================================
  web-ui:
    build:
      context: .
      dockerfile: docker/web-ui.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api-server
    restart: unless-stopped

  # ============================================================
  # WireMock — Mock Server（容器化）
  # ============================================================
  wiremock:
    image: wiremock/wiremock:3.5.4
    ports:
      - "8080:8080"
    volumes:
      - ./docker/wiremock/mappings:/home/wiremock/mappings
      - ./docker/wiremock/__files:/home/wiremock/__files
    restart: unless-stopped

